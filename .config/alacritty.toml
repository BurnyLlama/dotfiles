#render_timer = true

[general]
live_config_reload = true

[window]
decorations = "None"
dynamic_padding = true
title = "Alacritty"
opacity = 0.98

[window.class]
general = "Alacritty"
instance = "Alacritty"

[window.padding]
x = 24
y = 24

[scrolling]
history = 20000
multiplier = 3

[font]
#ligatures = true
size = 12

[font.bold]
#family = "FiraCode Nerd Font"
family = "Maple Mono NF"
#family = "0xProto Nerd Font"
style = "Medium"

[font.normal]
#family = "FiraCode Nerd Font"
family = "Maple Mono NF"
#family = "0xProto Nerd Font"
style = "Regular"

[colors]
draw_bold_text_with_bright_colors = false
transparent_background_colors = true

[colors.bright]
black = "#60607F"
blue = "#A3CEFA"
cyan = "#B7EFF0"
green = "#A9F4CC"
magenta = "#CFC2FE"
red = "#FA999A"
white = "#E0E0FF"
yellow = "#FFE38F"

[colors.normal]
black = "#30304F"
blue = "#74B6FB"
cyan = "#6BE8EB"
green = "#5DEEA1"
magenta = "#BCAAFD"
red = "#FA7A7C"
white = "#C0C0DF"
yellow = "#FFD147"

[colors.primary]
background = "#10102F"
foreground = "#E0E0FF"

[colors.selection]
background = "#E0E0FF"
text = "#10102F"

[cursor]
blink_interval = 750
blink_timeout = 0
unfocused_hollow = true

[cursor.style]
shape = "Underline"
blinking = "Always"

